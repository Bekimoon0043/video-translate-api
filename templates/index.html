<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amharic TTS</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        select, button { padding: 10px; margin-right: 10px; }
        audio { margin-top: 20px; width: 100%; }
    </style>
</head>
<body>
    <h1>Amharic Text-to-Speech</h1>
    <textarea id="text" placeholder="Enter text here...">ሰላም ዓለም</textarea>
    <br>
    <label for="lang">Language:</label>
    <select id="lang">
        <option value="am" selected>Amharic</option>
        <option value="en">English</option>
    </select>
    <button onclick="speak()">Speak</button>
    <audio id="audio" controls></audio>

    <script>
        function speak() {
            const text = document.getElementById('text').value;
            const lang = document.getElementById('lang').value;

            fetch('/api/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, lang })
            })
            .then(async response => {
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Server error (${response.status}): ${errorText}`);
                }
                return response.blob();
            })
            .then(blob => {
                const url = URL.createObjectURL(blob);
                const audio = document.getElementById('audio');
                audio.src = url;
                audio.play().catch(e => console.error('Playback failed:', e));
            })
            .catch(err => {
                console.error('Error:', err);
                alert('Failed to generate speech: ' + err.message);
            });
        }
    </script>
</body>
</html>
